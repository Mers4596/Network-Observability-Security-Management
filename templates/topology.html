{% extends "base.html" %}

{% block title %}Ağ Topolojisi | Nebula Net{% endblock %}

{% block extra_css %}
<!-- Topology CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/topology.css') }}">
<!-- Chart.js -->
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
    /* --- Topology Specific Animations --- */
    @keyframes dash-move {
        from {
            background-position: 0 0;
        }

        to {
            background-position: 40px 0;
        }
    }

    @keyframes node-glow-cyan {
        0% {
            box-shadow: 0 0 5px var(--neon-cyan-glow);
        }

        50% {
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        100% {
            box-shadow: 0 0 5px var(--neon-cyan-glow);
        }
    }

    /* --- Connection Lines (Neon SVG Style) --- */
    .line {
        height: 2px;
        background: rgba(0, 242, 255, 0.1);
        position: absolute;
        transform-origin: 0 50%;
        z-index: 1 !important;
        pointer-events: none;
        transition: var(--transition-smooth);
    }

    .line.active-flow {
        background: repeating-linear-gradient(90deg,
                var(--neon-cyan) 0%,
                var(--neon-cyan) 20%,
                transparent 20%,
                transparent 40%);
        background-size: 40px 100%;
        animation: dash-move 1s linear infinite;
        box-shadow: 0 0 10px var(--neon-cyan-glow);
        height: 3px;
        opacity: 0.8;
    }

    .line.red-path {
        background: repeating-linear-gradient(90deg,
                var(--critical-red) 0%,
                var(--critical-red) 25%,
                transparent 25%,
                transparent 50%);
        background-size: 30px 100%;
        animation: dash-move 0.6s linear infinite;
        box-shadow: 0 0 15px var(--critical-glow);
        height: 4px !important;
        z-index: 3 !important;
        opacity: 1;
    }

    .line.isolated-path {
        background: transparent !important;
        border-top: 2px dotted #454d5d !important;
        box-shadow: none !important;
        height: 1px !important;
        animation: none !important;
        opacity: 0.4;
    }

    /* --- Node Styling --- */
    .device-icon {
        position: absolute;
        width: 64px;
        height: 64px;
        background: var(--bg-glass);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border-glass);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: var(--transition-smooth);
        animation: node-glow-cyan 3s infinite;
    }

    .device-icon:hover {
        transform: scale(1.1) translateY(-5px);
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px var(--neon-cyan-glow);
        z-index: 20;
    }

    .device-icon.selected {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 30px var(--neon-cyan-glow);
        background: rgba(0, 242, 255, 0.05);
    }

    .device-icon i {
        font-size: 24px;
        color: var(--neon-cyan);
        filter: drop-shadow(0 0 5px var(--neon-cyan-glow));
    }

    .device-name {
        position: absolute;
        bottom: -25px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    /* --- Pulse States --- */
    .pulse-fast-red {
        animation: nodeStrobe 0.4s infinite !important;
        border-color: var(--critical-red) !important;
    }

    .pulse-slow-orange {
        animation: breathingPulse 3s infinite !important;
        border-color: var(--warning-orange) !important;
    }

    @keyframes nodeStrobe {
        0% {
            box-shadow: 0 0 0 0 var(--critical-glow);
            background: var(--critical-red);
        }

        50% {
            box-shadow: 0 0 25px 10px transparent;
            background: var(--bg-obsidian);
        }

        100% {
            box-shadow: 0 0 0 0 var(--critical-glow);
            background: var(--critical-red);
        }
    }

    @keyframes breathingPulse {
        0% {
            box-shadow: 0 0 5px var(--warning-glow);
        }

        50% {
            box-shadow: 0 0 20px 5px var(--warning-glow);
        }

        100% {
            box-shadow: 0 0 5px var(--warning-glow);
        }
    }

    .node-badge {
        position: absolute;
        top: -8px;
        right: -8px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        background: var(--bg-obsidian);
        border: 2px solid var(--border-glass);
        z-index: 15;
    }

    .status-isolated {
        filter: grayscale(1) !important;
        opacity: 0.6 !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="topology-content">
    <div class="content-header">
        <div class="content-title">
            Ağ Topolojisi
            <span class="live-badge"><i class="fas fa-circle"></i> CANLI</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot" style="background: #00D1FF;"></span>
                <span>Aktif Bağlantı</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background: #FF4B5C;"></span>
                <span>Problem</span>
            </div>
            <div class="legend-item">
                <div class="legend-line active"></div>
                <span>Veri Akışı</span>
            </div>
        </div>
    </div>

    <!-- Topoloji Haritası -->
    <div class="topology-map">
        <div class="map-container" id="mapContainer">
            <!-- Bağlantılar ve Cihazlar JavaScript ile dinamik olarak eklenecek -->
        </div>
    </div>
</div>

<!-- Side Drawer (Yan Panel) -->
<div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
        <h3>Cihaz Detayları</h3>
        <button class="close-drawer" id="closeDrawer">&times;</button>
    </div>
    <div id="drawerContent">
        <!-- İçerik dinamik olarak doldurulacak -->
    </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ─── State ────────────────────────────────────────────────────────────────
    let currentDevices = [];
    const nodeCache = new Map();

    // LocalStorage key for saved positions
    const LAYOUT_KEY = 'nebula_topology_layout';

    // Map of { deviceId → {x, y} } loaded from storage OR auto-calculated
    let savedPositions = loadSavedPositions();
    let isDirty = false; // true when user has moved a node since last save

    function loadSavedPositions() {
        try {
            const raw = localStorage.getItem(LAYOUT_KEY);
            return raw ? JSON.parse(raw) : {};
        } catch { return {}; }
    }

    function persistPositions() {
        localStorage.setItem(LAYOUT_KEY, JSON.stringify(savedPositions));
        isDirty = false;
        showToast('💾 Yerleşim kaydedildi!', '#00e676');
        updateSaveBtnState();
    }

    function resetLayout() {
        if (!confirm('Özel yerleşimi sil ve otomatik düzene dön?')) return;
        localStorage.removeItem(LAYOUT_KEY);
        savedPositions = {};
        isDirty = false;
        updateSaveBtnState();
        renderTopology(currentDevices);
        showToast('🔄 Yerleşim sıfırlandı.', '#00f2ff');
    }

    function updateSaveBtnState() {
        const btn = document.getElementById('saveLayoutBtn');
        if (!btn) return;
        btn.style.opacity = isDirty ? '1' : '0.55';
        btn.textContent = isDirty ? '💾 Kaydet *' : '💾 Yerleşim Kaydedildi';
    }

    function showToast(msg, color) {
        let t = document.getElementById('topoToast');
        if (!t) {
            t = document.createElement('div');
            t.id = 'topoToast';
            t.style.cssText = `position:fixed;bottom:30px;right:30px;z-index:9999;
                padding:12px 24px;border-radius:12px;font-family:Outfit,sans-serif;
                font-size:14px;font-weight:600;backdrop-filter:blur(10px);
                background:rgba(15,15,25,0.9);border:1px solid;
                transition:opacity 0.3s ease;pointer-events:none;`;
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.borderColor = color;
        t.style.color = color;
        t.style.opacity = '1';
        clearTimeout(t._hideTimer);
        t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
    }

    // ─── Layout Controls UI Injection ────────────────────────────────────────
    function injectLayoutControls() {
        if (document.getElementById('topoControls')) return;
        const ctrl = document.createElement('div');
        ctrl.id = 'topoControls';
        ctrl.innerHTML = `
            <button id="saveLayoutBtn" onclick="persistPositions()" title="Yerleşimi tarayıcıya kaydet"
              style="padding:8px 16px;border-radius:10px;border:1px solid #00e676;
                     background:rgba(0,230,118,0.08);color:#00e676;font-family:Outfit,sans-serif;
                     font-size:13px;cursor:pointer;transition:all 0.3s;opacity:0.55;">
              💾 Yerleşim Kaydedildi
            </button>
            <button onclick="resetLayout()" title="Otomatik düzene geri dön"
              style="padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);
                     background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55);
                     font-family:Outfit,sans-serif;font-size:13px;cursor:pointer;transition:all 0.3s;">
              🔄 Sıfırla
            </button>
            <span style="font-size:11px;color:rgba(255,255,255,0.35);align-self:center;">
              Düğümleri sürükleyerek yerleştirin
            </span>`;
        ctrl.style.cssText = `display:flex;align-items:center;gap:10px;
            position:absolute;top:16px;right:16px;z-index:100;`;
        document.querySelector('.topology-map').style.position = 'relative';
        document.querySelector('.topology-map').appendChild(ctrl);
    }

    // ─── Drag-and-Drop ────────────────────────────────────────────────────────
    function makeDraggable(el, deviceId, container) {
        let dragging = false;
        let startMouseX, startMouseY, startLeft, startTop;

        el.addEventListener('mousedown', (e) => {
            // Allow click on inner elements (open drawer on simple click)
            if (e.button !== 0) return;
            e.stopPropagation();

            dragging = false;
            startMouseX = e.clientX;
            startMouseY = e.clientY;
            startLeft = parseFloat(el.style.left);
            startTop = parseFloat(el.style.top);

            const onMove = (mv) => {
                const dx = mv.clientX - startMouseX;
                const dy = mv.clientY - startMouseY;
                if (!dragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                    dragging = true;
                    el.style.transition = 'none';
                    el.style.zIndex = '50';
                    el.style.cursor = 'grabbing';
                }
                if (!dragging) return;

                const cW = container.clientWidth;
                const cH = container.clientHeight;
                const nW = el.offsetWidth;
                const nH = el.offsetHeight;

                let newLeft = Math.max(0, Math.min(cW - nW, startLeft + dx));
                let newTop  = Math.max(0, Math.min(cH - nH, startTop  + dy));

                el.style.left = newLeft + 'px';
                el.style.top  = newTop  + 'px';

                // Live redraw connections
                drawConnections(currentDevices);
            };

            const onUp = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);

                el.style.cursor = 'pointer';
                el.style.zIndex = '10';

                if (dragging) {
                    // Persist new centre of the node
                    const nW = el.offsetWidth;
                    const nH = el.offsetHeight;
                    savedPositions[deviceId] = {
                        x: parseFloat(el.style.left) + nW / 2,
                        y: parseFloat(el.style.top)  + nH / 2
                    };
                    isDirty = true;
                    updateSaveBtnState();
                    drawConnections(currentDevices);
                }
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
    }

    // ─── Subscribe ────────────────────────────────────────────────────────────
    appStore.subscribe((state) => {
        currentDevices = state.devices;
        renderTopology(state.devices);
        setTimeout(() => handleURLFocus(), 100);
    });

    // ─── URL Focus ────────────────────────────────────────────────────────────
    function handleURLFocus(retryCount = 0) {
        const urlParams = new URLSearchParams(window.location.search);
        const focusId = urlParams.get('focus');
        if (!focusId) return;
        const el = document.getElementById(`node-${focusId}`);
        if (!el) {
            if (retryCount < 1) setTimeout(() => handleURLFocus(retryCount + 1), 500);
            return;
        }
        el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        openDrawer(focusId);
        document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');
        el.classList.add('focus-strobe');
        setTimeout(() => el.classList.remove('focus-strobe'), 5000);
    }

    // ─── Topology Renderer ────────────────────────────────────────────────────
    function renderTopology(devices) {
        const container = document.getElementById('mapContainer');
        const width  = container.clientWidth  || container.parentElement.clientWidth;
        const height = container.clientHeight || container.parentElement.clientHeight;
        const centerX = width  / 2;
        const centerY = height / 2;

        injectLayoutControls();

        const iconMap = {
            network: 'fa-network-wired', server: 'fa-database',
            pc: 'fa-desktop', workstation: 'fa-desktop',
            iot: 'fa-microchip', mobile: 'fa-mobile-alt'
        };

        // ── Auto-position calculation (used only when no saved position exists) ──
        const zones = { zero: [], one: [], two: {} };
        devices.forEach(d => {
            if (d.type.toLowerCase() === 'network') {
                zones.zero.push(d);
            } else if (d.type.toLowerCase() === 'server' || d.department === 'Infra') {
                zones.one.push(d);
            } else {
                const dept = d.department || 'General';
                if (!zones.two[dept]) zones.two[dept] = [];
                zones.two[dept].push(d);
            }
        });

        const autoPos = new Map();

        zones.zero.forEach((d, i) => {
            const spread = zones.zero.length > 1 ? 50 : 0;
            const angle = (i / zones.zero.length) * 2 * Math.PI;
            autoPos.set(d.id, { x: centerX + Math.cos(angle) * spread, y: centerY + Math.sin(angle) * spread, size: 72 });
        });

        zones.one.forEach((d, i) => {
            const radius = Math.min(width, height) * 0.30;
            const angle  = (i / zones.one.length) * 2 * Math.PI;
            autoPos.set(d.id, { x: centerX + Math.cos(angle) * radius, y: centerY + Math.sin(angle) * radius, size: 64 });
        });

        const depts = Object.keys(zones.two);
        depts.forEach((dept, dIdx) => {
            const islandAngle   = (dIdx / depts.length) * 2 * Math.PI;
            const islandRadius  = Math.min(width, height) * 0.42;
            const islandCenterX = centerX + Math.cos(islandAngle) * islandRadius;
            const islandCenterY = centerY + Math.sin(islandAngle) * islandRadius;
            zones.two[dept].forEach((d, i) => {
                const localAngle  = (i / zones.two[dept].length) * 2 * Math.PI;
                const localRadius = 90;
                autoPos.set(d.id, {
                    x: islandCenterX + Math.cos(localAngle) * localRadius,
                    y: islandCenterY + Math.sin(localAngle) * localRadius,
                    size: 56
                });
            });
        });

        // Collision avoidance on auto-calculated positions only
        const nodeIds = Array.from(autoPos.keys());
        for (let iter = 0; iter < 15; iter++) {
            for (let i = 0; i < nodeIds.length; i++) {
                for (let j = i + 1; j < nodeIds.length; j++) {
                    const pA = autoPos.get(nodeIds[i]);
                    const pB = autoPos.get(nodeIds[j]);
                    const dx = pB.x - pA.x, dy = pB.y - pA.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = 130;
                    if (dist < minDist && dist > 0) {
                        const overlap = (minDist - dist) / 2;
                        const nx = dx / dist, ny = dy / dist;
                        pA.x -= nx * overlap; pA.y -= ny * overlap;
                        pB.x += nx * overlap; pB.y += ny * overlap;
                    }
                }
            }
        }

        // ── Render each device node ──────────────────────────────────────────
        devices.forEach(device => {
            const auto = autoPos.get(device.id) || { x: centerX, y: centerY, size: 56 };
            const size = auto.size;

            // Use saved position when available; otherwise use auto-calculated
            const saved = savedPositions[device.id];
            const finalX = saved ? saved.x : Math.max(size, Math.min(width  - size, auto.x));
            const finalY = saved ? saved.y : Math.max(size, Math.min(height - size, auto.y));

            let el = document.getElementById(`node-${device.id}`);
            const isNew = !el;

            if (isNew) {
                el = document.createElement('div');
                el.id = `node-${device.id}`;
                container.appendChild(el);
                nodeCache.set(device.id, el);
            }

            el.className = `device-icon ${device.type.toLowerCase()}`;
            el.style.cssText += `
                width:${size}px; height:${size}px;
                left:${finalX - size / 2}px; top:${finalY - size / 2}px;
                cursor: pointer; user-select: none;
                transition: box-shadow 0.3s, border-color 0.3s;
            `;

            if (device.status === 'Isolated')         el.classList.add('status-isolated');
            else if (device.risk_level > 80)          el.classList.add('pulse-fast-red');
            else if (device.shadow_risk_flag)         el.classList.add('pulse-slow-orange');

            const badgeIcon  = device.status === 'Isolated' ? 'fa-unlink' : (device.risk_level > 80 ? 'fa-radiation' : (device.status === 'online' ? 'fa-shield-alt' : 'fa-clock'));
            const badgeClass = device.status === 'Isolated' ? 'badge-threat' : (device.risk_level > 80 ? 'badge-threat' : (device.risk_level > 30 ? 'badge-warning' : 'badge-secure'));
            const icon       = iconMap[device.type.toLowerCase()] || 'fa-question';

            el.innerHTML = `
                <div class="node-badge ${badgeClass}"><i class="fas ${badgeIcon}"></i></div>
                <div class="device-status status-${device.status.toLowerCase() === 'online' ? 'up' : (device.status.toLowerCase() === 'warning' ? 'warning' : 'down')}"></div>
                <i class="fas ${icon}" style="font-size:${size / 2.5}px"></i>
                <span class="device-name" style="bottom:-20px;font-size:${size / 6}px">${device.hostname}</span>
            `;

            // Drag support (only add once)
            if (isNew) {
                makeDraggable(el, device.id, container);
                el.addEventListener('click', (e) => {
                    if (e._wasDragged) return;
                    document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
                    el.classList.add('selected');
                    openDrawer(device.id);
                });
            }
        });

        drawConnections(devices);
    }

    // ─── Connection Drawing ───────────────────────────────────────────────────
    function drawConnections(devices) {
        const topologyLinks = appStore.state.topology || [];
        topologyLinks.forEach(link => {
            const fromEl = document.getElementById(`node-${link.source_id}`);
            const toEl   = document.getElementById(`node-${link.target_id}`);
            if (!fromEl || !toEl) return;

            const lineId = `line-${link.source_id}-${link.target_id}`;
            let line = document.getElementById(lineId);
            if (!line) {
                line = document.createElement('div');
                line.id = lineId;
                line.className = 'line';
                document.getElementById('mapContainer').appendChild(line);
            }

            const fromPos = {
                x: parseFloat(fromEl.style.left) + fromEl.offsetWidth  / 2,
                y: parseFloat(fromEl.style.top)  + fromEl.offsetHeight / 2
            };
            const toPos = {
                x: parseFloat(toEl.style.left) + toEl.offsetWidth  / 2,
                y: parseFloat(toEl.style.top)  + toEl.offsetHeight / 2
            };

            const length = Math.sqrt(Math.pow(toPos.x - fromPos.x, 2) + Math.pow(toPos.y - fromPos.y, 2));
            const angle  = Math.atan2(toPos.y - fromPos.y, toPos.x - fromPos.x) * 180 / Math.PI;

            line.style.cssText = `
                width:${length}px; left:${fromPos.x}px; top:${fromPos.y}px;
                transform:rotate(${angle}deg); position:absolute; z-index:1;
            `;

            const fromDev = devices.find(d => d.id === link.source_id) || {};
            const toDev   = devices.find(d => d.id === link.target_id) || {};
            line.className = 'line';
            if (fromDev.status === 'Isolated' || toDev.status === 'Isolated' || link.status === 'down') {
                line.classList.add('isolated-path');
            } else if (fromDev.risk_level > 80 || toDev.risk_level > 80) {
                line.classList.add('red-path');
            } else {
                line.classList.add('active-flow');
            }
        });
    }

    // ─── Live Edge Width ──────────────────────────────────────────────────────
    async function updateLiveEdges() {
        try {
            const res  = await fetch('/api/traffic');
            const logs = await res.json();
            const topologyLinks = appStore.state.topology || [];
            topologyLinks.forEach(link => {
                const line = document.getElementById(`line-${link.source_id}-${link.target_id}`);
                if (!line) return;
                const deviceLog = logs.find(l => l.device_id === link.source_id);
                const bytes = deviceLog ? deviceLog.bytes_sent : 500;
                const thickness = Math.min(6, Math.max(1, bytes / 10000));
                line.style.height = `${thickness}px`;
            });
        } catch (err) { console.error('Traffic update failed:', err); }
    }

    // ─── Side Drawer ──────────────────────────────────────────────────────────
    async function openDrawer(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        if (!device) return;
        const drawer = document.getElementById('sideDrawer');
        const drawerContent = document.getElementById('drawerContent');

        let latestScan = { vulnerabilities_found: 'No scan data' };
        try {
            const scans = await (await fetch('/api/scans')).json();
            const ds = scans.find(s => s.device_id === deviceId);
            if (ds) latestScan = ds;
        } catch {}

        const iconMap = { network: 'fa-network-wired', server: 'fa-database', pc: 'fa-desktop', iot: 'fa-microchip', mobile: 'fa-mobile-alt' };
        const canRestore = latestScan.vulnerabilities_found.includes('Threat Neutralized');

        drawerContent.innerHTML = `
            <div style="font-size:40px;text-align:center;margin-bottom:20px;color:var(--neon-cyan);">
                <i class="fas ${iconMap[device.type] || 'fa-question'}"></i></div>
            <h2 style="text-align:center;margin-bottom:30px;letter-spacing:2px;">${device.hostname}</h2>
            <div class="glass-card" style="margin-bottom:20px;padding:15px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span>IP ADDRESS</span><strong style="color:var(--neon-cyan)">${device.ip_address}</strong></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span>RISK SCORE</span><strong style="color:${device.risk_level > 80 ? 'var(--critical-red)' : 'var(--neon-cyan)'}">${device.risk_level}%</strong></div>
                <div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span>LOCATION</span><strong>${device.location}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>STATUS</span><span class="status-pill ${device.status === 'Isolated' ? 'pill-isolated' : (device.risk_level > 80 ? 'pill-critical' : 'pill-online')}">${device.status.toUpperCase()}</span></div>
            </div>
            <h4 style="margin:30px 0 15px;color:var(--text-muted);font-size:12px;letter-spacing:2px;">REMEDIATION CONTROL</h4>
            <div class="glass-card" style="background:rgba(243,156,18,0.03);border-left:4px solid var(--warning-orange);margin-bottom:30px;">
                <p style="font-size:11px;color:var(--text-muted);margin-bottom:5px;">LAST SCAN FINDING</p>
                <p style="font-size:14px;color:white;font-weight:500;">${latestScan.vulnerabilities_found}</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;">
                <a href="/assets?id=${device.id}" class="action-btn" style="text-decoration:none;text-align:center;border-color:var(--neon-cyan);color:var(--neon-cyan);">
                    <i class="fas fa-external-link-alt"></i> VARLIK DETAYLARI
                </a>
                <a href="/securityAudit?target=${device.id}" class="action-btn" style="text-decoration:none;text-align:center;border-color:var(--warning-orange);color:var(--warning-orange);">
                    <i class="fas fa-shield-alt"></i> GÜVENLİK KAYITLARI
                </a>
                ${device.status !== 'Isolated' ? `<button onclick="isolateDevice('${device.id}')" class="action-btn action-btn-red"><i class="fas fa-unlink"></i> SEVER CONNECTION</button>` : ''}
                <button onclick="manualScan('${device.id}')" class="action-btn" ${device.status === 'Under Scan' ? 'disabled' : ''}>
                    <i class="fas fa-microchip"></i> ${device.status === 'Under Scan' ? 'DIAGNOSING...' : 'FORCE MANUAL SCAN'}
                </button>
                ${device.status === 'Isolated' && canRestore
                    ? `<button onclick="restoreDevice('${device.id}')" class="action-btn" style="border-color:#00e676;color:#00e676;"><i class="fas fa-bolt"></i> RESTORE NODE</button>`
                    : (device.status === 'Isolated' ? `<div style="background:rgba(255,75,43,.1);padding:12px;border-radius:8px;text-align:center;border:1px solid rgba(255,75,43,.2);"><p style="font-size:11px;color:var(--critical-red);"><i class="fas fa-lock"></i> RESTORE LOCKED: HAZARDOUS STATE</p></div>` : '')}
            </div>`;
        drawer.classList.add('open');
    }

    async function isolateDevice(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        if (!device || !confirm(`Sever network connection for ${device.hostname}?`)) return;
        await deviceAction('isolate', deviceId, device.hostname);
        await appStore.loadData(); openDrawer(deviceId);
    }

    async function manualScan(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        await deviceAction('scan', deviceId, device ? device.hostname : deviceId);
        await appStore.loadData(); openDrawer(deviceId);
        setTimeout(async () => { await appStore.loadData(); openDrawer(deviceId); }, 3500);
    }

    async function restoreDevice(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        await deviceAction('restore', deviceId, device ? device.hostname : deviceId);
        await appStore.loadData(); openDrawer(deviceId);
    }

    // ─── Event Listeners ──────────────────────────────────────────────────────
    setInterval(updateLiveEdges, 3000);

    document.getElementById('closeDrawer').addEventListener('click', () => {
        document.getElementById('sideDrawer').classList.remove('open');
        document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
    });

    window.addEventListener('resize', () => drawConnections(currentDevices));
</script>
{% endblock %}

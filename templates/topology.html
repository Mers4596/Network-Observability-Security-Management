{% extends "base.html" %}

{% block title %}Ağ Topolojisi | Nebula Net{% endblock %}

{% block extra_css %}
<!-- Topology CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/topology.css') }}">
<!-- Chart.js -->
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
    /* --- Topology Specific Animations --- */
    @keyframes dash-move {
        from {
            background-position: 0 0;
        }

        to {
            background-position: 40px 0;
        }
    }

    @keyframes node-glow-cyan {
        0% {
            box-shadow: 0 0 5px var(--neon-cyan-glow);
        }

        50% {
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        100% {
            box-shadow: 0 0 5px var(--neon-cyan-glow);
        }
    }

    /* --- Connection Lines (Neon SVG Style) --- */
    .line {
        height: 2px;
        background: rgba(0, 242, 255, 0.1);
        position: absolute;
        transform-origin: 0 50%;
        z-index: 1 !important;
        pointer-events: none;
        transition: var(--transition-smooth);
    }

    .line.active-flow {
        background: repeating-linear-gradient(90deg,
                var(--neon-cyan) 0%,
                var(--neon-cyan) 20%,
                transparent 20%,
                transparent 40%);
        background-size: 40px 100%;
        animation: dash-move 1s linear infinite;
        box-shadow: 0 0 10px var(--neon-cyan-glow);
        height: 3px;
        opacity: 0.8;
    }

    .line.red-path {
        background: repeating-linear-gradient(90deg,
                var(--critical-red) 0%,
                var(--critical-red) 25%,
                transparent 25%,
                transparent 50%);
        background-size: 30px 100%;
        animation: dash-move 0.6s linear infinite;
        box-shadow: 0 0 15px var(--critical-glow);
        height: 4px !important;
        z-index: 3 !important;
        opacity: 1;
    }

    .line.isolated-path {
        background: transparent !important;
        border-top: 2px dotted #454d5d !important;
        box-shadow: none !important;
        height: 1px !important;
        animation: none !important;
        opacity: 0.4;
    }

    /* --- Node Styling --- */
    .device-icon {
        position: absolute;
        width: 64px;
        height: 64px;
        background: var(--bg-glass);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border-glass);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: var(--transition-smooth);
        animation: node-glow-cyan 3s infinite;
    }

    .device-icon:hover {
        transform: scale(1.1) translateY(-5px);
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px var(--neon-cyan-glow);
        z-index: 20;
    }

    .device-icon.selected {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 30px var(--neon-cyan-glow);
        background: rgba(0, 242, 255, 0.05);
    }

    .device-icon i {
        font-size: 24px;
        color: var(--neon-cyan);
        filter: drop-shadow(0 0 5px var(--neon-cyan-glow));
    }

    .device-name {
        position: absolute;
        bottom: -25px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }

    /* --- Pulse States --- */
    .pulse-fast-red {
        animation: nodeStrobe 0.4s infinite !important;
        border-color: var(--critical-red) !important;
    }

    .pulse-slow-orange {
        animation: breathingPulse 3s infinite !important;
        border-color: var(--warning-orange) !important;
    }

    @keyframes nodeStrobe {
        0% {
            box-shadow: 0 0 0 0 var(--critical-glow);
            background: var(--critical-red);
        }

        50% {
            box-shadow: 0 0 25px 10px transparent;
            background: var(--bg-obsidian);
        }

        100% {
            box-shadow: 0 0 0 0 var(--critical-glow);
            background: var(--critical-red);
        }
    }

    @keyframes breathingPulse {
        0% {
            box-shadow: 0 0 5px var(--warning-glow);
        }

        50% {
            box-shadow: 0 0 20px 5px var(--warning-glow);
        }

        100% {
            box-shadow: 0 0 5px var(--warning-glow);
        }
    }

    .node-badge {
        position: absolute;
        top: -8px;
        right: -8px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        background: var(--bg-obsidian);
        border: 2px solid var(--border-glass);
        z-index: 15;
    }

    .status-isolated {
        filter: grayscale(1) !important;
        opacity: 0.6 !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="topology-content">
    <div class="content-header">
        <div class="content-title">
            Ağ Topolojisi
            <span class="live-badge"><i class="fas fa-circle"></i> CANLI</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot" style="background: #00D1FF;"></span>
                <span>Aktif Bağlantı</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background: #FF4B5C;"></span>
                <span>Problem</span>
            </div>
            <div class="legend-item">
                <div class="legend-line active"></div>
                <span>Veri Akışı</span>
            </div>
        </div>
    </div>

    <!-- Topoloji Haritası -->
    <div class="topology-map">
        <div class="map-container" id="mapContainer">
            <!-- Bağlantılar ve Cihazlar JavaScript ile dinamik olarak eklenecek -->
        </div>
    </div>
</div>

<!-- Side Drawer (Yan Panel) -->
<div class="side-drawer" id="sideDrawer">
    <div class="drawer-header">
        <h3>Cihaz Detayları</h3>
        <button class="close-drawer" id="closeDrawer">&times;</button>
    </div>
    <div id="drawerContent">
        <!-- İçerik dinamik olarak doldurulacak -->
    </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // State & Cache
    let currentDevices = [];
    let trafficData = [];
    const nodeCache = new Map();
    const edgeCache = new Map();

    appStore.subscribe((state) => {
        currentDevices = state.devices;
        renderTopology(state.devices);
        
        // Handle URL focus pivot (Forensic Bridge)
        setTimeout(() => handleURLFocus(), 100);
    });

    /**
     * Parse URL for focus parameter and highlight/center the target node.
     * Retries once if the node isn't found immediately.
     */
    function handleURLFocus(retryCount = 0) {
        const urlParams = new URLSearchParams(window.location.search);
        const focusId = urlParams.get('focus');
        if (!focusId) return;

        const el = document.getElementById(`node-${focusId}`);
        if (!el) {
            if (retryCount < 1) {
                console.log(`Node ${focusId} not found, retrying in 500ms...`);
                setTimeout(() => handleURLFocus(retryCount + 1), 500);
            }
            return;
        }

        // 1. Center viewport
        el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });

        // 2. Open drawer
        openDrawer(focusId);

        // 3. Select node visually
        document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');

        // 4. Trace-strobe animation
        el.classList.add('focus-strobe');
        setTimeout(() => el.classList.remove('focus-strobe'), 5000);
    }

    // 1. Flicker-Free Node Renderer
    function renderTopology(devices) {
        const container = document.getElementById('mapContainer');
        const width = container.clientWidth;
        const height = container.clientHeight;
        const centerX = width / 2;
        const centerY = height / 2;
        const padding = 100;

        const iconMap = {
            network: 'fa-network-wired',
            server: 'fa-database',
            pc: 'fa-desktop',
            workstation: 'fa-desktop',
            iot: 'fa-microchip',
            mobile: 'fa-mobile-alt'
        };

        // Categorize for Zonal Logic
        const zones = {
            zero: [], // Core (Network)
            one: [],  // Infra/Servers
            two: {}   // Departmental Islands
        };

        devices.forEach(d => {
            if (d.type.toLowerCase() === 'network') {
                zones.zero.push(d);
            } else if (d.type.toLowerCase() === 'server' || d.department === 'Infra') {
                zones.one.push(d);
            } else {
                const dept = d.department || 'General';
                if (!zones.two[dept]) zones.two[dept] = [];
                zones.two[dept].push(d);
            }
        });

        const positions = new Map();

        // Zone 0: Center
        zones.zero.forEach((d, i) => {
            const spread = zones.zero.length > 1 ? 50 : 0;
            const angle = (i / zones.zero.length) * 2 * Math.PI;
            positions.set(d.id, {
                x: centerX + Math.cos(angle) * spread,
                y: centerY + Math.sin(angle) * spread,
                size: 72
            });
        });

        // Zone 1: Inner Ring
        zones.one.forEach((d, i) => {
            const radius = 350; // Increased from 180
            const angle = (i / zones.one.length) * 2 * Math.PI;
            positions.set(d.id, {
                x: centerX + Math.cos(angle) * radius,
                y: centerY + Math.sin(angle) * radius,
                size: 64
            });
        });

        // Zone 2: Departmental Islands
        const depts = Object.keys(zones.two);
        depts.forEach((dept, dIdx) => {
            const islandAngle = (dIdx / depts.length) * 2 * Math.PI;
            const islandRadius = Math.min(width, height) * 0.75; // Increased from 0.35
            const islandCenterX = centerX + Math.cos(islandAngle) * islandRadius;
            const islandCenterY = centerY + Math.sin(islandAngle) * islandRadius;

            zones.two[dept].forEach((d, i) => {
                const localAngle = (i / zones.two[dept].length) * 2 * Math.PI;
                const localRadius = 150; // Increased from 60
                positions.set(d.id, {
                    x: islandCenterX + Math.cos(localAngle) * localRadius,
                    y: islandCenterY + Math.sin(localAngle) * localRadius,
                    size: 56
                });
            });
        });

        // Collision Avoidance (Force-directed-ish adjustment)
        const nodeIds = Array.from(positions.keys());
        for (let iter = 0; iter < 10; iter++) { // Increased iterations
            for (let i = 0; i < nodeIds.length; i++) {
                for (let j = i + 1; j < nodeIds.length; j++) {
                    const idA = nodeIds[i];
                    const idB = nodeIds[j];
                    const posA = positions.get(idA);
                    const posB = positions.get(idB);
                    const dx = posB.x - posA.x;
                    const dy = posB.y - posA.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = 120; // Increased from (size+size)/2 + 30

                    if (dist < minDist) {
                        const overlap = minDist - dist;
                        const nx = dx / dist || 1;
                        const ny = dy / dist || 0;
                        posA.x -= nx * overlap / 2;
                        posA.y -= ny * overlap / 2;
                        posB.x += nx * overlap / 2;
                        posB.y += ny * overlap / 2;
                    }
                }
            }
        }

        // Render nodes with calculated positions
        devices.forEach(device => {
            const pos = positions.get(device.id);
            // Boundary Intelligence
            pos.x = Math.max(pos.size, Math.min(width - pos.size, pos.x));
            pos.y = Math.max(pos.size, Math.min(height - pos.size, pos.y));

            let el = document.getElementById(`node-${device.id}`);
            const isNew = !el;

            if (isNew) {
                el = document.createElement('div');
                el.id = `node-${device.id}`;
                container.appendChild(el);
                nodeCache.set(device.id, el);
            }

            el.className = `device-icon ${device.type.toLowerCase()}`;
            el.style.width = `${pos.size}px`;
            el.style.height = `${pos.size}px`;
            el.style.left = `${pos.x - pos.size / 2}px`;
            el.style.top = `${pos.y - pos.size / 2}px`;

            if (device.status === 'Isolated') {
                el.classList.add('status-isolated');
            } else if (device.risk_level > 80) {
                el.classList.add('pulse-fast-red');
            } else if (device.shadow_risk_flag) {
                el.classList.add('pulse-slow-orange');
            }

            let badgeIcon = device.status === 'Isolated' ? 'fa-unlink' : (device.risk_level > 80 ? 'fa-radiation' : (device.status === 'online' ? 'fa-shield-alt' : 'fa-clock'));
            let badgeClass = device.status === 'Isolated' ? 'badge-threat' : (device.risk_level > 80 ? 'badge-threat' : (device.risk_level > 30 ? 'badge-warning' : 'badge-secure'));

            const icon = iconMap[device.type.toLowerCase()] || 'fa-question';
            el.innerHTML = `
                <div class="node-badge ${badgeClass}"><i class="fas ${badgeIcon}"></i></div>
                <div class="device-status status-${device.status.toLowerCase() == 'online' ? 'up' : (device.status.toLowerCase() == 'warning' ? 'warning' : 'down')}"></div>
                <i class="fas ${icon}" style="font-size: ${pos.size / 2.5}px"></i>
                <span class="device-name" style="bottom: -20px; font-size: ${pos.size / 6}px">${device.hostname}</span>
            `;

            if (isNew) {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
                    el.classList.add('selected');
                    openDrawer(device.id);
                });
            }
        });

        drawConnections(devices);
    }

    // 2. Connection Drawing with Dynamic Width placeholder
    function drawConnections(devices) {
        const topologyLinks = appStore.state.topology || [];
        topologyLinks.forEach(link => {
            const fromEl = document.getElementById(`node-${link.source_id}`);
            const toEl = document.getElementById(`node-${link.target_id}`);

            if (!fromEl || !toEl) return;

            let lineId = `line-${link.source_id}-${link.target_id}`;
            let line = document.getElementById(lineId);
            if (!line) {
                line = document.createElement('div');
                line.id = lineId;
                line.className = 'line';
                document.getElementById('mapContainer').appendChild(line);
            }

            const fromPos = {
                x: parseFloat(fromEl.style.left) + fromEl.clientWidth / 2,
                y: parseFloat(fromEl.style.top) + fromEl.clientHeight / 2
            };
            const toPos = {
                x: parseFloat(toEl.style.left) + toEl.clientWidth / 2,
                y: parseFloat(toEl.style.top) + toEl.clientHeight / 2
            };

            const length = Math.sqrt(Math.pow(toPos.x - fromPos.x, 2) + Math.pow(toPos.y - fromPos.y, 2));
            const angle = Math.atan2(toPos.y - fromPos.y, toPos.x - fromPos.x) * 180 / Math.PI;

            line.style.width = length + 'px';
            line.style.left = fromPos.x + 'px';
            line.style.top = fromPos.y + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            line.style.position = 'absolute';
            line.style.zIndex = '1';

            const fromDevice = currentDevices.find(d => d.id === link.source_id) || {};
            const toDevice = currentDevices.find(d => d.id === link.target_id) || {};

            // Path Styling Logic
            line.className = 'line';
            if (fromDevice.status === 'Isolated' || toDevice.status === 'Isolated' || link.status === 'down') {
                line.classList.add('isolated-path');
            } else if (fromDevice.risk_level > 80 || toDevice.risk_level > 80) {
                line.classList.add('red-path');
            } else {
                line.classList.add('active-flow');
            }

            if (fromDevice.status === 'offline' || toDevice.status === 'offline') {
                line.classList.add('down');
            }
        });
    }

    // 3. Dynamic Edge Width Logic (Every 3 seconds)
    async function updateLiveEdges() {
        try {
            const res = await fetch('/api/traffic');
            const logs = await res.json();
            const topologyLinks = appStore.state.topology || [];

            topologyLinks.forEach(link => {
                const lineId = `line-${link.source_id}-${link.target_id}`;
                const line = document.getElementById(lineId);
                if (!line) return;

                // Find recent bytes for this link's source
                const deviceLog = logs.find(l => l.device_id === link.source_id);
                const bytes = deviceLog ? deviceLog.bytes_sent : 500;

                // Map bytes to thickness (1px to 6px)
                const thickness = Math.min(6, Math.max(1, bytes / 10000));
                line.style.height = `${thickness}px`;
                line.style.background = thickness > 4 ? '#FFB74D' : '#00D1FF';
            });
        } catch (err) {
            console.error("Traffic update failed:", err);
        }
    }

    // 4. Enhanced Side Drawer (Triple Action)
    async function openDrawer(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        if (!device) return;

        const drawer = document.getElementById('sideDrawer');
        const drawerContent = document.getElementById('drawerContent');

        // Fetch latest scan finding for this device
        let latestScan = { vulnerabilities_found: 'No scan data' };
        try {
            const scanRes = await fetch('/api/scans');
            const scans = await scanRes.json();
            const deviceScan = scans.find(s => s.device_id === deviceId);
            if (deviceScan) latestScan = deviceScan;
        } catch (err) { console.error("Could not fetch scan history:", err); }

        const iconMap = {
            network: 'fa-network-wired', server: 'fa-database', pc: 'fa-desktop', iot: 'fa-microchip', mobile: 'fa-mobile-alt'
        };

        const canRestore = latestScan.vulnerabilities_found.includes("Threat Neutralized");

        drawerContent.innerHTML = `
            <div class="device-detail-icon" style="font-size: 40px; text-align: center; margin-bottom: 20px; color: var(--neon-cyan);"><i class="fas ${iconMap[device.type] || 'fa-question'}"></i></div>
            <h2 style="text-align: center; margin-bottom: 30px; letter-spacing: 2px;">${device.hostname}</h2>
            
            <div class="glass-card" style="margin-bottom: 20px; padding: 15px;">
                <div class="detail-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span>IP ADDRESS</span><strong style="color: var(--neon-cyan);">${device.ip_address}</strong></div>
                <div class="detail-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span>RISK SCORE</span><strong style="color: ${device.risk_level > 80 ? 'var(--critical-red)' : 'var(--neon-cyan)'}">${device.risk_level}%</strong></div>
                <div class="detail-row" style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span>LOCATION</span><strong>${device.location}</strong></div>
                <div class="detail-row" style="display: flex; justify-content: space-between;"><span>STATUS</span><span class="status-pill ${device.status === 'Isolated' ? 'pill-isolated' : (device.risk_level > 80 ? 'pill-critical' : 'pill-online')}">${device.status.toUpperCase()}</span></div>
            </div>

            <h4 style="margin: 30px 0 15px; color: var(--text-muted); font-size: 12px; letter-spacing: 2px;">REMEDIATION CONTROL</h4>
            <div class="glass-card" style="background: rgba(243, 156, 18, 0.03); border-left: 4px solid var(--warning-orange); margin-bottom: 30px;">
                <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 5px;">LAST SCAN FINDING</p>
                <p style="font-size: 14px; color: white; font-weight: 500;">${latestScan.vulnerabilities_found}</p>
            </div>

            <div class="action-menu" style="display: flex; flex-direction: column; gap: 12px;">
                <a href="/assets?id=${device.id}" class="action-btn" style="text-decoration: none; text-align: center; border-color: var(--neon-cyan); color: var(--neon-cyan);">
                    <i class="fas fa-external-link-alt"></i> VARLIK DETAYLARINA GİT
                </a>

                <a href="/securityAudit?target=${device.id}" class="action-btn" style="text-decoration: none; text-align: center; border-color: var(--warning-orange); color: var(--warning-orange);">
                    <i class="fas fa-shield-alt"></i> GÜVENLİK KAYITLARINA GİT
                </a>

                ${device.status !== 'Isolated' ? `
                    <button onclick="isolateDevice('${device.id}')" class="action-btn action-btn-red">
                        <i class="fas fa-unlink"></i> SEVER CONNECTION
                    </button>
                ` : ''}

                <button onclick="manualScan('${device.id}')" class="action-btn" ${device.status === 'Under Scan' ? 'disabled' : ''}>
                    <i class="fas fa-microchip"></i> ${device.status === 'Under Scan' ? 'DIAGNOSING...' : 'FORCE MANUAL SCAN'}
                </button>

                ${device.status === 'Isolated' && canRestore ? `
                    <button onclick="restoreDevice('${device.id}')" class="action-btn" style="border-color: #00e676; color: #00e676;">
                        <i class="fas fa-bolt"></i> RESTORE NODE
                    </button>
                ` : (device.status === 'Isolated' ? `
                    <div style="background: rgba(255, 75, 43, 0.1); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid rgba(255, 75, 43, 0.2);">
                        <p style="font-size: 11px; color: var(--critical-red);"><i class="fas fa-lock"></i> RESTORE LOCKED: HAZARDOUS STATE</p>
                    </div>
                ` : '')}
            </div>
        `;

        drawer.classList.add('open');
    }

    async function isolateDevice(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        if (!device || !confirm(`Sever network connection for ${device.hostname}?`)) return;
        await deviceAction('isolate', deviceId, device.hostname);
        // Refresh local data then reopen drawer
        await appStore.loadData();
        openDrawer(deviceId);
    }

    async function manualScan(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        await deviceAction('scan', deviceId, device ? device.hostname : deviceId);
        await appStore.loadData();
        openDrawer(deviceId);
        // Re-refresh drawer after ~3.5s so the updated scan row is visible
        setTimeout(async () => {
            await appStore.loadData();
            openDrawer(deviceId);
        }, 3500);
    }

    async function restoreDevice(deviceId) {
        const device = currentDevices.find(d => d.id === deviceId);
        await deviceAction('restore', deviceId, device ? device.hostname : deviceId);
        await appStore.loadData();
        openDrawer(deviceId);
    }

    // Loops
    setInterval(updateLiveEdges, 3000);

    document.getElementById('closeDrawer').addEventListener('click', () => {
        document.getElementById('sideDrawer').classList.remove('open');
        document.querySelectorAll('.device-icon').forEach(d => d.classList.remove('selected'));
    });

    window.addEventListener('resize', () => drawConnections(currentDevices));
</script>
{% endblock %}
